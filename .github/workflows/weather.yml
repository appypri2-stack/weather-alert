name: weather-rain-alert
on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
jobs:
  weather-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2
      - name: check and notify
        run: python3 weather.py
